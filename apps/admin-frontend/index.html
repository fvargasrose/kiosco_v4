<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalKiosco — Panel Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:   #2563eb;
      --danger:  #dc2626;
      --success: #16a34a;
      --warn:    #d97706;
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1e293b;
      --muted:   #64748b;
      --radius:  8px;
    }

    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Layout */
    #app { min-height: 100vh; }
    .page-center { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: .5rem; }
    .sidebar-brand { font-weight: 700; font-size: 1rem; color: var(--brand); margin-bottom: 1rem; }
    .nav-link { display: block; padding: .625rem .75rem; border-radius: var(--radius); color: var(--text); text-decoration: none; font-size: .875rem; cursor: pointer; border: none; background: none; text-align: left; width: 100%; }
    .nav-link:hover, .nav-link.active { background: #eff6ff; color: var(--brand); }
    .main { flex: 1; padding: 2rem; overflow-y: auto; min-width: 0; }
    .page-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }

    /* Topbar móvil (oculto en escritorio) */
    .topbar { display: none; align-items: center; gap: .75rem; padding: .625rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 40; }
    .topbar-brand { font-weight: 700; color: var(--brand); font-size: .9375rem; }
    .hamburger { display: inline-flex; flex-direction: column; justify-content: center; gap: 4px; width: 40px; height: 40px; padding: 9px; border: none; background: none; cursor: pointer; border-radius: var(--radius); }
    .hamburger span { display: block; height: 2px; width: 100%; background: var(--text); border-radius: 2px; }
    .hamburger:hover { background: var(--bg); }
    .sidebar-backdrop { display: none; }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .8125rem; font-weight: 600; margin-bottom: .375rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .form-control { width: 100%; padding: .5rem .75rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: .9375rem; background: var(--surface); color: var(--text); }
    .form-control:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px #bfdbfe44; }
    .form-help { font-size: .8125rem; color: var(--muted); margin-top: .25rem; }
    .form-error { font-size: .875rem; color: var(--danger); margin-top: .375rem; }

    /* Radio group */
    .radio-group { display: flex; gap: 1rem; flex-wrap: wrap; }
    .radio-card { border: 2px solid var(--border); border-radius: var(--radius); padding: .75rem 1rem; cursor: pointer; display: flex; align-items: center; gap: .5rem; font-size: .9375rem; transition: border-color .15s; }
    .radio-card input[type=radio] { accent-color: var(--brand); }
    .radio-card.selected { border-color: var(--brand); background: #eff6ff; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .5rem 1.25rem; border-radius: var(--radius); font-size: .9375rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .9; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { opacity: .9; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover:not(:disabled) { opacity: .8; }

    /* Alerts */
    .alert { padding: .75rem 1rem; border-radius: var(--radius); font-size: .9375rem; margin-bottom: 1rem; }
    .alert-error   { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
    .alert-warn    { background: #fffbeb; color: var(--warn);    border: 1px solid #fde68a; }

    /* Login */
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
    .login-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; text-align: center; }

    /* File drop */
    .file-drop { border: 2px dashed var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    .file-drop:hover, .file-drop.over { border-color: var(--brand); background: #eff6ff; }
    .file-drop p { font-size: .9375rem; color: var(--muted); margin-top: .5rem; }
    .file-drop input[type=file] { display: none; }

    /* Media preview */
    .media-preview { max-width: 320px; max-height: 200px; border-radius: var(--radius); border: 1px solid var(--border); object-fit: contain; display: block; margin-top: .75rem; }

    /* Badge */
    .badge { display: inline-block; padding: .2em .6em; border-radius: 99px; font-size: .75rem; font-weight: 600; }
    .badge-info    { background: #dbeafe; color: #1e40af; }
    .badge-success { background: #dcfce7; color: #166534; }

    /* Spinner */
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: flex; align-items: center; justify-content: center; gap: .75rem; padding: 3rem; color: var(--muted); }

    /* Table genérica */
    .table { width: 100%; border-collapse: collapse; font-size: .9375rem; }
    .table th, .table td { padding: .625rem .75rem; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .table th { font-weight: 600; color: var(--muted); font-size: .8125rem; text-transform: uppercase; letter-spacing: .025em; }
    .table tr:last-child td { border-bottom: none; }

    /* Botón pequeño (acciones en tablas) */
    .btn-sm { padding: .25rem .625rem; font-size: .8125rem; background: var(--border); color: var(--text); margin-left: .25rem; }
    .btn-sm:hover:not(:disabled) { opacity: .8; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, .45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal-card { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
    .modal-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 1rem; }

    /* Dentist admin grid */
    .dentist-admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .dentist-admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; display: flex; flex-direction: column; gap: .75rem; }
    .dentist-admin-photo-wrap { display: flex; justify-content: center; }
    .dentist-admin-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); display: block; }
    .dentist-admin-avatar { width: 100px; height: 100px; border-radius: 50%; background: #dbeafe; color: #1e40af; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; border: 3px solid var(--border); }
    .dentist-admin-name { font-weight: 700; font-size: 1rem; }
    .dentist-admin-spec { font-size: .875rem; color: var(--muted); }
    .dentist-admin-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* ── Responsive (Hito E): sidebar off-canvas + ajustes móvil ── */
    @media (max-width: 768px) {
      .shell { flex-direction: column; }
      .topbar { display: flex; }
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; width: 260px; z-index: 60;
        transform: translateX(-100%); transition: transform .22s ease; overflow-y: auto;
      }
      .shell.nav-open .sidebar { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,.2); }
      .shell.nav-open .sidebar-backdrop {
        display: block; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 50;
      }
      .main { padding: 1.25rem 1rem; }
      .card { padding: 1.25rem 1rem; }
      .modal-card { max-width: 100%; }
      .dentist-admin-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .page-title { font-size: 1.125rem; }
      .radio-group { flex-direction: column; }
      .modal-card { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
